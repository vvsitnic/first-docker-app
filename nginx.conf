events { worker_connections 1024; }

http {
    types {
        text/css            css;
        text/html           html;
        application/json    json;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend_server:5000/;
        }
        
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://backend_server:3000/;
        }
    }
}